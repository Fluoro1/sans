<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta http-equiv="Content-Security-Policy" content="child-src 'self'"/>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Bad Time Simulator (Sans Fight) Online – Undertale Fan Game</title>
    <meta name="description" content="Play Bad Time Simulator (Sans Fight) online – experience the ultimate Undertale fan challenge against Sans." />
    <link rel="manifest" href="appmanifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="apple-touch-icon" sizes="256x256" href="icon-256.png" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="shortcut icon" sizes="256x256" href="icon-256.png" />
    
    <style type="text/css">
        * { padding: 0; margin: 0; }
        html, body { background: #000; color: #fff; overflow: hidden; touch-action: none; -ms-touch-action: none; }
        canvas { touch-action-delay: none; touch-action: none; -ms-touch-action: none; }
        
        /* Speed Dropdown Styling */
        #speed-control {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px;
            border: 1px solid #fff;
            font-family: Arial, sans-serif;
        }
        #speed-control label { font-size: 12px; margin-right: 5px; color: #fff; }
        #speed-select { background: #000; color: #fff; border: 1px solid #fff; cursor: pointer; }
    </style>

    <script src="/sdk.js"></script>
    <script>
        YaGames.init({ adv: { onAdvClose: wasShown => { console.info('adv closed!'); } } })
        .then(ysdk => { ysdk.adv.showFullscreenAdv(); window.ysdk = ysdk; });
    </script>
</head>
<body>
    <div id="fb-root"></div>

    <!-- Speed UI -->
    <div id="speed-control">
        <label for="speed-select">Speed:</label>
        <select id="speed-select" onchange="changeGameSpeed(this.value)">
            <option value="0.5">x0.5 (Easy)</option>
            <option value="1" selected>x1.0 (Normal)</option>
            <option value="1.25">x1.25</option>
            <option value="1.5">x1.5 (Hard)</option>
            <option value="2">x2.0 (Insane)</option>
        </select>
    </div>

    <div id="c2canvasdiv">
        <canvas id="c2canvas" width="640" height="480">
            <h1>Your browser does not support HTML5.</h1>
        </canvas>
    </div>

    <script src="jquery-3.4.1.min.js"></script>
    <script src="c2runtime.js"></script>
    <script>
        // Global reference for the runtime
        var gameRuntime = null;

        jQuery(document).ready(function() {
            // Create runtime and store it
            gameRuntime = cr_createRuntime("c2canvas");
        });

        // Function to change game speed
        function changeGameSpeed(val) {
            var speed = parseFloat(val);
            if (window.cr_setSuspended) {
                // Construct 2 internal method to set global timescale
                // Note: Some versions use gameRuntime.timescale
                if (typeof cr_setTimescale !== "undefined") {
                    cr_setTimescale(speed);
                } else {
                    // Fallback to searching the object directly
                    var rt = jQuery("#c2canvas")[0].c2runtime;
                    if (rt) rt.timescale = speed;
                }
                console.log("Speed set to: " + speed);
            }
        }

        // Visibility handlers
        function onVisibilityChanged() {
            if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
                cr_setSuspended(true);
            else
                cr_setSuspended(false);
        };
        document.addEventListener("visibilitychange", onVisibilityChanged, false);
    </script>
</body>
</html>
